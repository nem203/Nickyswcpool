<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Recap — Nicky's World Cup Pool</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<style>
  :root{ color-scheme:light; --navy:#10204e; --orange:#ea580c; --dark:#1a1c20; --grey:#6b7280; --line:#e5e7eb; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#eceef1; color:var(--dark); }
  .wrap{ max-width:760px; margin:0 auto; padding:0 14px 60px; }
  .top{ background:var(--navy); color:#fff; border-bottom:6px solid var(--orange); padding:16px 22px; display:flex; align-items:center; gap:12px; }
  .badge{ width:40px;height:40px;border-radius:50%;background:var(--orange);font-weight:800;display:flex;align-items:center;justify-content:center;flex:none; }
  .top h1{ font-size:18px; } .top a{ color:#9fb0e0; font-size:12px; margin-left:auto; text-decoration:none; }
  .datehead{ font-size:13px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--orange); margin:18px 0 4px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; box-shadow:0 4px 18px rgba(16,32,78,.06); }
  /* the recap html injected here uses simple tags; style them */
  .card h3{ font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--navy); margin:16px 0 8px; }
  .card h3:first-child{ margin-top:0; }
  .card p, .card li{ font-size:14px; line-height:1.5; }
  .card ul{ margin:0 0 6px 18px; }
  .card table{ width:100%; border-collapse:collapse; margin:4px 0 8px; }
  .card th,.card td{ text-align:left; padding:7px 8px; font-size:13px; border-bottom:1px solid #f1f2f4; }
  .card thead th{ font-size:11px; color:var(--grey); text-transform:uppercase; }
  .msg{ color:var(--grey); font-size:14px; padding:18px 2px; }
  .stamp{ text-align:right; font-size:11px; color:#9ca3af; margin-top:8px; }
</style>
</head>
<body>
<div class="top"><span class="badge">26</span><h1>Daily Recap</h1><a href="/" style="margin-left:auto">Standings</a><a href="/rules.html" style="margin-left:14px">Rules</a><a href="/schedule.html" style="margin-left:14px">Schedule</a><a href="/analysis.html" style="margin-left:14px">Analysis</a><a href="/draft.html" style="margin-left:14px">Draft →</a></div>
<div class="wrap">
  <div id="out"></div>
  <div class="stamp">Updated each morning during the tournament.</div>
</div>
<script>
async function load(){
  try{
    const r = await fetch("/api/state",{cache:"no-store"});
    const P = await r.json();
    const out = document.getElementById("out");
    if(P && P.recap && P.recap.html){
      out.innerHTML = `<div class="datehead">${P.recap.date||""}</div><div class="card">${P.recap.html}</div>`;
    } else {
      out.innerHTML = `<div class="msg">No recap yet — the first daily report posts the morning after matches begin.</div>`;
    }
  }catch(e){ document.getElementById("out").innerHTML = `<div class="msg">Connection issue — retrying…</div>`; }
}
load(); setInterval(load, 60000);
</script>
</body>
</html>
