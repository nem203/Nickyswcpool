<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rules — Nicky's World Cup Pool</title>
<style>
  :root{ color-scheme:light; --navy:#10204e; --orange:#ea580c; --blue:#1d4ed8; --dark:#1a1c20; --grey:#6b7280; --line:#e5e7eb; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#eceef1; color:var(--dark); }
  .wrap{ max-width:720px; margin:0 auto; padding:0 14px 60px; }
  .top{ background:var(--navy); color:#fff; border-bottom:6px solid var(--orange); padding:16px 22px; display:flex; align-items:center; gap:12px; }
  .badge{ width:40px;height:40px;border-radius:50%;background:var(--orange);font-weight:800;display:flex;align-items:center;justify-content:center;flex:none; }
  .top h1{ font-size:18px; } .top a{ color:#9fb0e0; font-size:12px; text-decoration:none; }
  h2{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--blue); margin:26px 0 10px; }
  p{ font-size:14px; line-height:1.55; margin-bottom:8px; }
  .players{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:4px; }
  .chip{ display:flex; align-items:center; gap:8px; border:1px solid var(--line); background:#fff; border-radius:9px; padding:7px 12px; font-size:13px; font-weight:600; }
  .chip .dot{ width:11px;height:11px;border-radius:50%; }
  .cards{ display:flex; gap:14px; flex-wrap:wrap; }
  .card{ flex:1; min-width:240px; background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .chead{ color:#fff; font-weight:800; font-size:14px; padding:11px 15px; }
  .row{ display:flex; justify-content:space-between; align-items:center; padding:9px 15px; font-size:13px; border-top:1px solid #f1f2f4; }
  .row:first-of-type{ border-top:none; }
  .pt{ min-width:26px; height:26px; padding:0 8px; border-radius:13px; color:#fff; font-weight:800; font-size:13px; display:inline-flex; align-items:center; justify-content:center; }
  ul{ margin:0 0 8px 18px; } li{ font-size:14px; line-height:1.5; margin-bottom:6px; }
  .msg{ color:var(--grey); font-size:14px; padding:14px 2px; }
</style>
</head>
<body>
<div class="top"><span class="badge">26</span><h1>Pool Rules</h1><span style="margin-left:auto"></span><a href="/">Standings</a><a href="/draft.html" style="margin-left:14px">Draft →</a></div>
<div class="wrap"><div id="out"><div class="msg">Loading…</div></div></div>
<script>
const FALLBACK = { groupWin:2, groupDraw:1, r32:2, r16:3, qf:3, sf:3, third:1, final:4, bonus1st:3, bonus2nd:2, bonus3rdAdvance:1, bonusAllAdvance:3, bonusSweep:1 };
async function load(){
  let P = null;
  try { const r = await fetch("/api/state",{cache:"no-store"}); P = await r.json(); } catch(e){}
  const S = (P && P.scoring) ? P.scoring : FALLBACK;
  const order = (P && P.order) || ["Nicky","Reilly","Diccy","Gary","Gabey","Lee"];
  const colors = (P && P.colors) || {};
  const col = n => colors[n] || "#64748b";
  const players = order.map(n => `<span class="chip"><span class="dot" style="background:${col(n)}"></span>${n}</span>`).join("");
  const std = [["Group stage win",S.groupWin],["Group stage draw",S.groupDraw],["Round of 32 win",S.r32],["Round of 16 win",S.r16],["Quarterfinal win",S.qf],["Semifinal win",S.sf],["3rd-place match win",S.third],["Final win",S.final]];
  const bon = [["1st place in group",S.bonus1st],["2nd place in group",S.bonus2nd],["3rd place & advance to KO",S.bonus3rdAdvance],["All your teams advance",S.bonusAllAdvance],["A team wins all 3 group games",S.bonusSweep]];
  const rows = (arr,c) => arr.map(([l,v]) => `<div class="row"><span>${l}</span><span class="pt" style="background:${c}">${v}</span></div>`).join("");
  document.getElementById("out").innerHTML = `
    <h2>The Players</h2>
    <div class="players">${players}</div>
    <h2>The Format</h2>
    <p>Each manager drafts <b>six national teams</b> before the tournament. The 2026 World Cup has 48 teams in 12 groups of four; the top two of each group plus the eight best third-placed teams reach the Round of 32. Your score is the sum of points your six teams earn all tournament long.</p>
    <h2>Scoring</h2>
    <div class="cards">
      <div class="card"><div class="chead" style="background:#1d4ed8">Standard</div>${rows(std,"#1d4ed8")}</div>
      <div class="card"><div class="chead" style="background:#ea580c">Bonus</div>${rows(bon,"#ea580c")}</div>
    </div>
    <h2>How It Works</h2>
    <ul>
      <li>Each of your six teams scores on its own — add them up for your running total.</li>
      <li>Group placement bonuses are awarded once each group concludes.</li>
      <li>Knockout matches decided on penalties count as a win for the side that advances.</li>
      <li>The "all teams advance" bonus (+${S.bonusAllAdvance}) needs all six of your teams to reach the Round of 32.</li>
    </ul>
    <h2>Standings, Tiebreakers &amp; Daily Briefing</h2>
    <p>Standings are ranked by total points. Ties are broken at the commissioner's discretion (suggested: whose teams reached the furthest stage); Nicky is commissioner. Each morning during the tournament a recap is posted to the <a href="/recap.html">Daily Recap</a> page — yesterday's results and scorers, updated standings, head-to-head, and the day's fixtures.</p>`;
}
load();
</script>
</body>
</html>
