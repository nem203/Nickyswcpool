<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nicky's World Cup Pool — Standings</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#10204e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC Pool">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root{ color-scheme:light; --navy:#10204e; --orange:#ea580c; --dark:#1a1c20; --grey:#6b7280; --line:#e5e7eb; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#eceef1; color:var(--dark); }
  .wrap{ max-width:920px; margin:0 auto; padding:0 14px 60px; }
  .top{ background:var(--navy); color:#fff; border-bottom:6px solid var(--orange); padding:16px 22px; display:flex; align-items:center; gap:12px; }
  .badge{ width:40px;height:40px;border-radius:50%;background:var(--orange);font-weight:800;display:flex;align-items:center;justify-content:center;flex:none; }
  .top h1{ font-size:18px; } .top a{ color:#9fb0e0; font-size:12px; margin-left:auto; text-decoration:none; }
  .hero{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:#fff; border:1px solid var(--line); border-left:5px solid var(--orange); border-radius:12px; padding:13px 18px; margin:16px 0; }
  .hero .medal{ font-size:20px; } .hero .nm{ font-weight:800; font-size:18px; display:inline-flex; align-items:center; gap:8px; }
  .hero .dot{ width:12px;height:12px;border-radius:50%; } .hero .pts{ font-weight:700; } .hero .gap{ color:var(--grey); font-size:13px; margin-left:auto; }
  h2{ font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--navy); margin:26px 0 10px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ text-align:left; padding:11px 14px; font-size:14px; } thead th{ font-size:11px; text-transform:uppercase; color:var(--grey); border-bottom:1px solid #eef0f2; }
  tbody tr{ border-bottom:1px solid #f1f2f4; } tbody tr:last-child{ border-bottom:none; } .lead td{ background:#fff7ed; }
  .pdot{ width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle; }
  .pdot[style*="#ffffff"], .odot[style*="#ffffff"], .ptbar span[style*="#ffffff"]{ border:1.5px solid #2563eb; box-sizing:border-box; }
  .pts{ text-align:right; font-weight:800; }
  .rosters{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
  .roster{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:13px 15px; }
  .roster h3{ margin:0 0 6px; font-size:14px; display:flex; justify-content:space-between; align-items:center; }
  .roster ul{ list-style:none; } .roster li{ display:flex; justify-content:space-between; font-size:13px; padding:4px 0; border-top:1px solid #f4f5f6; }
  .roster li:first-child{ border-top:none; } .roster li.tbd{ color:#b4b8bf; font-style:italic; }
  .cc{ display:inline-block; background:#eef1f5; color:#10204e; font-weight:800; padding:2px 5px; border-radius:4px; font-size:8px; font-family:ui-monospace,Menlo,Consolas,monospace; margin-right:5px; }
  .groups{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .grp{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:11px 13px; }
  .grp h3{ font-size:14px; margin-bottom:6px; }
  .gt{ width:100%; border-collapse:collapse; font-size:12px; } .gt th,.gt td{ padding:5px; text-align:right; }
  .gt th:first-child,.gt td:first-child{ text-align:left; } .gt thead th{ font-size:10px; color:var(--grey); text-transform:uppercase; border-bottom:1px solid var(--line); }
  .gt tbody tr{ border-top:1px solid #f6f7f8; } .gt .adv td:first-child{ box-shadow:inset 4px 0 0 #059669; padding-left:9px; }
  .gt td.gp{ font-weight:800; } .gw{color:#059669;font-weight:600;} .gl{color:#dc2626;} .odot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-left:4px;}
  .stamp{ text-align:right; font-size:11px; color:#9ca3af; margin:6px 0 0; }
  .msg{ color:var(--grey); font-size:14px; padding:18px 2px; }
  .countdown{ background:var(--navy); color:#fff; border-radius:12px; padding:12px 18px; margin:16px 0; display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .countdown .cd-lbl{ font-size:12px; color:#9fb0e0; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  .countdown .cd-nums{ font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; }
  .chartwrap{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; height:280px; position:relative; }
  tr.elim td{ color:#b4b8bf; }
  table.h2h th,table.h2h td{ text-align:center; padding:8px 6px; font-size:13px; } table.h2h td:first-child,table.h2h th:first-child{ text-align:left; }
</style>
</head>
<body>
<div class="top"><span class="badge">26</span><h1>Nicky's World Cup Pool</h1><a href="/rules.html" style="margin-left:auto">Rules</a><a href="/recap.html" style="margin-left:14px">Recap</a><a href="/schedule.html" style="margin-left:14px">Schedule</a><a href="/analysis.html" style="margin-left:14px">Analysis</a><a href="/odds.html" style="margin-left:14px">Odds</a><a href="/draft.html" style="margin-left:14px">Draft →</a></div>
<div class="wrap">
  <div class="countdown" id="countdown"></div>
  <div id="hero"></div>
  <div id="alerts"></div>
  <div id="content"></div>
  <div class="stamp" id="stamp"></div>
</div>
<script>
let P = null;
const cc = t => `<span class="cc">${(P.codes&&P.codes[t])||""}</span>`;
const colorOf = n => (P.colors && P.colors[n]) || "#999";
const ownerOf = t => { for (const pl in byPlayer) if (byPlayer[pl].includes(t)) return pl; return null; };
let byPlayer = {};
const PATTERN = [[[0,1],[2,3]],[[0,2],[3,1]],[[3,0],[1,2]]];

function teamPoints(t){
  if(!t) return 0; const S=P.scoring; let p=0;
  p+=(t.gw||0)*S.groupWin+(t.gd||0)*S.groupDraw+(t.r32||0)*S.r32+(t.r16||0)*S.r16+(t.qf||0)*S.qf+(t.sf||0)*S.sf+(t.third||0)*S.third+(t.final||0)*S.final;
  if(t.groupPlace===1)p+=S.bonus1st; else if(t.groupPlace===2)p+=S.bonus2nd; else if(t.groupPlace==="3adv")p+=S.bonus3rdAdvance;
  if(t.sweep)p+=S.bonusSweep; return p;
}
function rows(){
  return P.order.map(name=>{
    const teams=byPlayer[name]||[]; let total=0,adv=0,gp=0;
    const detail=teams.map(tn=>{ const t=(P.teams||{})[tn]; const pts=teamPoints(t); total+=pts; if(t&&t.advanced)adv++; return {name:tn,pts,advanced:!!(t&&t.advanced)}; });
    teams.forEach(tn=>{ gp+=groupGP(tn); });
    const left=teams.length*3-gp;
    if(teams.length===6 && adv===6){ total+=P.scoring.bonusAllAdvance; }
    return {name,total,adv,gp,left,poss:gp*(P.scoring.groupWin||2),drafted:teams.length,detail};
  }).sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
}
function groupTable(g){
  const teams=P.groups[g]; const st={}; teams.forEach(t=>st[t]={t,pld:0,w:0,d:0,l:0,gf:0,ga:0}); let n=0;
  PATTERN.forEach(md=>md.forEach(([a,b])=>{ n++; const r=(P.results||{})[g+"-"+n]; if(!r||r.hs==null)return;
    const h=teams[a],aw=teams[b]; st[h].pld++;st[aw].pld++; st[h].gf+=r.hs;st[h].ga+=r.as;st[aw].gf+=r.as;st[aw].ga+=r.hs;
    if(r.hs>r.as){st[h].w++;st[aw].l++;}else if(r.hs<r.as){st[aw].w++;st[h].l++;}else{st[h].d++;st[aw].d++;} }));
  return Object.values(st).map(x=>({...x,gd:x.gf-x.ga,pts:x.w*3+x.d})).sort((p,q)=>q.pts-p.pts||q.gd-p.gd||q.gf-p.gf||p.t.localeCompare(q.t));
}
function groupGP(team){ const g=Object.keys(P.groups).find(k=>P.groups[k].includes(team)); if(!g)return 0; const teams=P.groups[g]; let n=0,played=0; PATTERN.forEach(md=>md.forEach(([a,b])=>{ n++; const r=(P.results||{})[g+"-"+n]; if(r&&r.hs!=null&&(teams[a]===team||teams[b]===team))played++; })); return played; }
function koAll(){ const S=P.scoring; return S.r32+S.r16+S.qf+S.sf+S.final; }
function maxFuture(team){ const t=(P.teams||{})[team]; const S=P.scoring; if(t&&t.out)return 0; if(!t)return 3*S.groupWin+S.bonus1st+S.bonusSweep+koAll(); if(t.final)return 0; if(t.sf)return S.final; if(t.qf)return S.sf+S.final; if(t.r16)return S.qf+S.sf+S.final; if(t.r32)return S.r16+S.qf+S.sf+S.final; if(t.advanced)return koAll(); const gp=groupGP(team),losses=Math.max(0,gp-(t.gw||0)-(t.gd||0)),rem=Math.max(0,3-gp); const placeUp=t.groupPlace?0:S.bonus1st; const sweepUp=(losses===0&&(t.gd||0)===0&&!t.sweep)?S.bonusSweep:0; return rem*S.groupWin+placeUp+sweepUp+koAll(); }
function isAlive(team){ const t=(P.teams||{})[team]; return !(t&&t.out); }
function h2hMatrix(){ const players=P.order; const M={}; players.forEach(a=>{M[a]={};players.forEach(b=>M[a][b]=[0,0,0]);}); Object.keys(P.groups).forEach(g=>{ const teams=P.groups[g]; let n=0; PATTERN.forEach(md=>md.forEach(([a,b])=>{ n++; const r=(P.results||{})[g+"-"+n]; if(!r||r.hs==null)return; const ho=ownerOf(teams[a]),ao=ownerOf(teams[b]); if(!ho||!ao||ho===ao)return; if(r.hs>r.as){M[ho][ao][0]++;M[ao][ho][2]++;}else if(r.hs<r.as){M[ao][ho][0]++;M[ho][ao][2]++;}else{M[ho][ao][1]++;M[ao][ho][1]++;} })); }); return M; }

async function load(){
  try{ const r=await fetch("/api/state",{cache:"no-store"}); P=await r.json(); render(); }
  catch(e){ document.getElementById("content").innerHTML=`<div class="msg">Connection issue — retrying…</div>`; }
}
function render(){
  if(!P || P.uninitialized){ document.getElementById("content").innerHTML=`<div class="msg">The pool isn't set up yet.</div>`; return; }
  byPlayer={}; P.order.forEach(p=>byPlayer[p]=[]); (P.picks||[]).forEach(x=>{ if(byPlayer[x.player]) byPlayer[x.player].push(x.team); });
  const R=rows(); const anyPts=R.some(r=>r.total>0); const lead=R[0];
  // hero
  const hero=document.getElementById("hero");
  if(anyPts){ const gap=R.length>1?lead.total-R[1].total:0; hero.innerHTML=`<span class="medal">🥇</span><span class="nm"><span class="dot" style="background:${colorOf(lead.name)}"></span>${lead.name}</span><span class="pts">${lead.total} pts</span><span class="gap">${gap>0?gap+" clear of "+R[1].name:"tied at the top"}</span>`; }
  else hero.innerHTML=`<span class="medal">🏆</span><span class="gap" style="margin-left:0">${(P.picks||[]).length?"Drafted — standings begin when matches kick off.":"Draft in progress…"}</span>`;
  // phone alerts opt-in
  const al=document.getElementById("alerts");
  if(al){ if(P.ntfyTopic){ al.innerHTML=`<div style="background:#fff7ed;border:1px solid #f3c6a8;border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.5;color:#7c2d12">📱 <b>Get phone alerts</b> for standings updates &amp; the daily report: install the free <b>ntfy</b> app (App Store / Google Play), then subscribe to topic <b>${P.ntfyTopic}</b> — or open <a href="https://ntfy.sh/${P.ntfyTopic}" target="_blank" rel="noopener" style="color:#9a3412;font-weight:700">ntfy.sh/${P.ntfyTopic}</a>. Keep the topic name within the group.</div>`; } else { al.innerHTML=""; } }
  // content
  let h=`<h2>Standings</h2><div class="card"><table><thead><tr><th>#</th><th>Player</th><th>Teams in</th><th style="text-align:right">GP</th><th style="text-align:right">Rem</th><th style="text-align:right">Pts</th><th style="text-align:right">Poss</th></tr></thead><tbody>`;
  h+=R.map((r,i)=>`<tr class="${anyPts&&i===0&&r.total>0?'lead':''}"><td>${i+1}</td><td><span class="pdot" style="background:${colorOf(r.name)}"></span>${r.name}</td><td>${r.adv}/${r.drafted||6}</td><td style="text-align:right">${r.gp}</td><td style="text-align:right">${r.left}</td><td class="pts">${r.total}</td><td style="text-align:right">${r.poss}</td></tr>`).join("");
  h+=`</tbody></table></div>`;
  h+=`<h2>Rosters</h2><div class="rosters">`+R.map(r=>{
    const items=r.drafted===0?`<li class="tbd">no picks yet</li>`:r.detail.map(d=>`<li><span>${cc(d.name)}${d.name}${d.advanced?' ▶':''}</span><span>${d.pts}</span></li>`).join("");
    return `<div class="roster" style="border-top:4px solid ${colorOf(r.name)}"><h3><span><span class="pdot" style="background:${colorOf(r.name)}"></span>${r.name}</span><span>${r.total} pts</span></h3><ul>${items}</ul></div>`;
  }).join("")+`</div>`;
  h+=`<h2>Group Tables</h2><div class="groups">`+Object.keys(P.groups).map(g=>{
    const tbl=groupTable(g); const played=tbl.some(x=>x.pld>0);
    const body=tbl.map((x,idx)=>{ const cls=idx<2?'adv':''; const own=ownerOf(x.t); const od=own?` <span class="odot" style="background:${colorOf(own)}"></span>`:'';
      return `<tr class="${cls}"><td>${cc(x.t)}${x.t}${od}</td><td>${x.pld}</td><td${x.w?' class="gw"':''}>${x.w}</td><td>${x.d}</td><td${x.l?' class="gl"':''}>${x.l}</td><td>${x.gd>0?'+':''}${x.gd}</td><td class="gp">${x.pts}</td></tr>`; }).join("");
    return `<div class="grp"><h3>Group ${g}</h3><table class="gt"><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>${body}</tbody></table>${played?'':'<div style="font-size:11px;color:#9ca3af;margin-top:6px">No matches played yet</div>'}</div>`;
  }).join("")+`</div>`;

  // Still Alive & Ceiling
  const proj=R.map(r=>{ const ts=byPlayer[r.name]||[]; const alive=ts.filter(isAlive).length; const future=ts.reduce((s,tn)=>s+maxFuture(tn),0);
    const advc=ts.filter(tn=>{const t=(P.teams||{})[tn];return t&&t.advanced;}).length; const alreadyBonus=ts.length===6&&advc===6;
    const possible=ts.length===6&&ts.every(tn=>{const t=(P.teams||{})[tn];return !t||(!t.out&&(t.advanced||groupGP(tn)<3));});
    const allAdv=(!alreadyBonus&&possible)?P.scoring.bonusAllAdvance:0;
    return {name:r.name,alive,drafted:ts.length,banked:r.total,ceil:r.total+future+allAdv}; }).sort((a,b)=>b.ceil-a.ceil||b.banked-a.banked);
  const topBanked=R.length?R[0].total:0;
  h+=`<h2>Still Alive &amp; Ceiling</h2><div class="card"><table><thead><tr><th>Manager</th><th>Alive</th><th style="text-align:right">Banked</th><th style="text-align:right">Max possible</th></tr></thead><tbody>`+proj.map(p=>{ const elim=topBanked>0&&p.ceil<topBanked; return `<tr class="${elim?'elim':''}"><td><span class="pdot" style="background:${colorOf(p.name)}"></span>${p.name}${elim?' <span style="font-size:10px;background:#fee2e2;color:#b91c1c;border-radius:6px;padding:1px 5px">OUT</span>':''}</td><td>${p.alive}/${p.drafted||6}</td><td style="text-align:right">${p.banked}</td><td class="pts">${p.ceil}</td></tr>`; }).join("")+`</tbody></table></div>`;

  // Head to Head
  const M=h2hMatrix();
  h+=`<h2>Head to Head</h2><div class="card" style="overflow-x:auto"><table class="h2h"><thead><tr><th>vs →</th>`+P.order.map(p=>`<th><span class="pdot" style="background:${colorOf(p)}"></span></th>`).join("")+`</tr></thead><tbody>`+P.order.map(a=>`<tr><td><span class="pdot" style="background:${colorOf(a)}"></span>${a}</td>`+P.order.map(b=>{ if(a===b)return `<td style="color:#cbd5e1">—</td>`; const w=M[a][b]; const any=w[0]+w[1]+w[2]>0; return `<td>${any?w[0]+"-"+w[1]+"-"+w[2]:'<span style="color:#cbd5e1">·</span>'}</td>`; }).join("")+`</tr>`).join("")+`</tbody></table></div>`;

  // Points Over Time
  h+=`<h2>Points Over Time</h2><div class="chartwrap"><canvas id="ptsChart"></canvas><div class="msg" id="chartEmpty" style="text-align:center"></div></div>`;

  document.getElementById("content").innerHTML=h;
  renderChart();
  document.getElementById("stamp").textContent="Auto-refreshes every 15s";
}
let chartInst=null;
function renderChart(){
  const cv=document.getElementById("ptsChart"); const emp=document.getElementById("chartEmpty"); if(!cv)return;
  const H=(P&&P.history)||[];
  if(H.length<1){ cv.style.display="none"; if(emp)emp.textContent="The chart fills in as daily results are recorded."; return; }
  if(typeof Chart==="undefined"){ setTimeout(renderChart,250); return; }
  cv.style.display="block"; if(emp)emp.textContent="";
  const labels=H.map(x=>x.label);
  const ds=P.order.map(n=>({ label:n, data:H.map(x=>x.pts&&x.pts[n]!=null?x.pts[n]:null), borderColor:colorOf(n)==="#ffffff"?"#2563eb":colorOf(n), backgroundColor:colorOf(n)==="#ffffff"?"#2563eb":colorOf(n), borderWidth:2.5, tension:.25, pointRadius:2, spanGaps:true }));
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(cv.getContext("2d"),{ type:"line", data:{labels,datasets:ds}, options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:"index",intersect:false}, plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:12}}}}, scales:{y:{beginAtZero:true,title:{display:true,text:"Total points"}}} } });
}
function tickCountdown(){
  const el=document.getElementById("countdown"); if(!el)return;
  const ko=new Date(Date.UTC(2026,5,11,19,0,0)); // Jun 11, 3:00 PM ET kickoff
  const diff=ko-new Date();
  if(diff<=0){ el.innerHTML=`<span class="cd-lbl">The tournament is underway! ⚽</span>`; return; }
  const d=Math.floor(diff/864e5),hh=Math.floor(diff%864e5/36e5),mm=Math.floor(diff%36e5/6e4),ss=Math.floor(diff%6e4/1e3);
  el.innerHTML=`<span class="cd-lbl">⚽ Kickoff · Mexico v South Africa</span><span class="cd-nums">${d}d ${hh}h ${mm}m ${ss}s</span>`;
}
setInterval(tickCountdown,1000); tickCountdown();
load(); setInterval(load, 15000);
</script>
</body>
</html>
